name: medintelligence

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: medintelligence-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://api.papalino.com.br}
      CHATBOT_RUNTIME_URL: ${CHATBOT_RUNTIME_URL:-http://langchain-runtime:8787}
      CACHE_LARAVEL_CONFIG: ${CACHE_LARAVEL_CONFIG:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    ports:
      - "${API_PORT:-8000}:80"
    volumes:
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - medintelligence-network

  langchain-runtime:
    build:
      context: ./agent-runtime
      dockerfile: Dockerfile
    image: medintelligence-langchain-runtime:latest
    restart: unless-stopped
    environment:
      APP_PORT: 8787
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      RUNTIME_SERVICE_TOKEN: ${CHATBOT_RUNTIME_SECRET}
      LARAVEL_BASE_URL: http://api
      LARAVEL_AGENT_SECRET: ${CHATBOT_RUNTIME_SECRET}
      REQUEST_TIMEOUT_SECONDS: ${CHATBOT_REQUEST_TIMEOUT_SECONDS:-30}
      MAX_RESULT_ROWS: ${CHATBOT_MAX_RESULT_ROWS:-10}
      DEFAULT_HISTORY_LIMIT: ${CHATBOT_RUNTIME_HISTORY_LIMIT:-20}
      PENDING_ACTIONS_BACKEND: ${CHATBOT_RUNTIME_PENDING_ACTIONS_BACKEND:-auto}
      PENDING_ACTIONS_DATABASE_URL: ${CHATBOT_RUNTIME_PENDING_ACTIONS_DATABASE_URL:-}
      PENDING_ACTIONS_DB_PATH: ${CHATBOT_RUNTIME_PENDING_ACTIONS_DB_PATH:-.runtime/pending_actions.sqlite3}
      PENDING_ACTIONS_TTL_MINUTES: ${CHATBOT_RUNTIME_PENDING_ACTIONS_TTL_MINUTES:-30}
      PENDING_ACTIONS_MAX_REPEAT_COUNT: ${CHATBOT_RUNTIME_PENDING_ACTIONS_MAX_REPEAT_COUNT:-2}
    ports:
      - "${RUNTIME_PORT:-8787}:8787"
    volumes:
      - runtime_data:/app/.runtime
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - medintelligence-network

volumes:
  storage_data:
  cache_data:
  runtime_data:

networks:
  medintelligence-network:
    driver: bridge
