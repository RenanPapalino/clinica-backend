services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinica-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - ./storage:/var/www/storage
    networks:
      - clinica-network

  langchain-runtime:
    build:
      context: ./agent-runtime
      dockerfile: Dockerfile
    container_name: medintelligence-langchain-runtime
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      APP_PORT: 8787
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      RUNTIME_SERVICE_TOKEN: ${CHATBOT_RUNTIME_SECRET}
      LARAVEL_BASE_URL: http://api
      LARAVEL_AGENT_SECRET: ${CHATBOT_RUNTIME_SECRET}
      REQUEST_TIMEOUT_SECONDS: 20
      MAX_RESULT_ROWS: 10
      DEFAULT_HISTORY_LIMIT: 20
    depends_on:
      - api
    networks:
      - clinica-network

networks:
  clinica-network:
    driver: bridge
